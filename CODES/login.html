<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta http-equiv="X-UA-Compatible" content="IE=edge">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>login</title>

   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.2/css/all.min.css">

   <link rel="stylesheet" href="style.css">

</head>
<body>

<header class="header">
   
   <section class="flex">

      <a href="home.html" class="logo">KnowledgeNest</a>
      <img src="images/logo-1.jpeg" alt="Logo" style="height: 95px; width: 95px; max-width: 100%; border-radius: 50%; object-fit: cover;">


      <form action="search.html" method="post" class="search-form">
         <input type="text" name="search_box" required placeholder="search courses..." maxlength="100">
         <button type="submit" class="fas fa-search"></button>
      </form>

      <div class="icons">
         <div id="menu-btn" class="fas fa-bars"></div>
         <div id="search-btn" class="fas fa-search"></div>
         <div id="user-btn" class="fas fa-user"></div>
         <div id="toggle-btn" class="fas fa-sun"></div>
      </div>

      <div class="profile">
         <img src="images/pic-1.jpg class="image" alt="">
         <h3 class="name">VIHAAN</h3>
         <p class="role">student</p>
         <a href="profile.html" class="btn">view profile</a>
         <div class="flex-btn">
            <a href="login.html" class="option-btn">login</a>
            <a href="register.html" class="option-btn">register</a>
         </div>
      </div>

   </section>

</header>   

<div class="side-bar">

   <div id="close-btn">
      <i class="fas fa-times"></i>
   </div>

   <div class="profile">
      <img src="images/pic-1.jpg" class="image" alt="">
      <h3 class="name">VIHAAN</h3>
      <p class="role">student</p>
      <a href="profile.html" class="btn">view profile</a>
   </div>

   <nav class="navbar">
      <a href="home.html"><i class="fas fa-home"></i><span>home</span></a>
      <a href="about.html"><i class="fas fa-question"></i><span>about</span></a>
      <a href="courses.html"><i class="fas fa-graduation-cap"></i><span>courses</span></a>
      <a href="teachers.html"><i class="fas fa-chalkboard-user"></i><span>teachers</span></a>
      <a href="contact.html"><i class="fas fa-headset"></i><span>contact us</span></a>
   </nav>

</div>

<section class="form-container">

   <form id="loginForm">
      <h3>login now</h3>
      <p>your email <span>*</span></p>
      <input type="email" id="email" name="email" placeholder="enter your email" required maxlength="50" class="box">
      <p>your password <span>*</span></p>
      <input type="password" id="password" name="password" placeholder="enter your password" required maxlength="20" class="box">
      <input type="submit" value="login now" class="btn">
   </form>

</section>

<footer class="footer">

   &copy; copyright @ 2024 by <span>KnowledgeNest</span> | all rights reserved!

</footer>

<!-- API and custom js file links -->
<script src="api.js"></script>
<script src="script.js"></script>

<script>
// Login form handling
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    
    try {
        UIHelpers.showLoading(true);
        
        const response = await api.login({ email, password });
        
        UIHelpers.saveUserData(response.user);
        UIHelpers.showMessage('Login successful!', 'success');
        
        // Redirect based on user role
        setTimeout(() => {
            if (response.user.role === 'admin') {
                window.location.href = 'dashboard.html';
            } else {
                window.location.href = 'home.html';
            }
        }, 1000);
        
    } catch (error) {
        UIHelpers.showMessage(error.message || 'Login failed', 'error');
    } finally {
        UIHelpers.showLoading(false);
    }
});

// Check if already logged in
if (UIHelpers.isLoggedIn()) {
    const user = UIHelpers.getCurrentUser();
    if (user && user.role === 'admin') {
        window.location.href = 'dashboard.html';
    } else {
        window.location.href = 'home.html';
    }
}
</script>

   
</body>
</html>
