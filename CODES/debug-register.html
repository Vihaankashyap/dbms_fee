<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Registration - KnowledgeNest</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            padding: 20px; 
            max-width: 600px;
            margin: 0 auto;
        }
        .form-group { 
            margin-bottom: 15px; 
        }
        label { 
            display: block; 
            margin-bottom: 5px; 
            font-weight: bold;
        }
        input { 
            width: 100%; 
            padding: 10px; 
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        button { 
            width: 100%;
            padding: 15px; 
            background: #007bff; 
            color: white; 
            border: none; 
            cursor: pointer; 
            border-radius: 5px;
            font-size: 16px;
        }
        .debug { 
            background: #f8f9fa; 
            padding: 15px; 
            margin: 10px 0;
            border-radius: 5px;
            border-left: 4px solid #007bff;
        }
        .error { 
            background: #f8d7da; 
            color: #721c24; 
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .success { 
            background: #d4edda; 
            color: #155724; 
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>🐛 Debug Registration Form</h1>
    
    <form id="debugRegisterForm">
        <div class="form-group">
            <label>Name:</label>
            <input type="text" id="name" value="Debug User" required>
        </div>
        
        <div class="form-group">
            <label>Email:</label>
            <input type="email" id="email" value="debug@example.com" required>
        </div>
        
        <div class="form-group">
            <label>Password:</label>
            <input type="password" id="password" value="debug123" required>
            <small>Current value: <span id="passwordValue">debug123</span></small>
        </div>
        
        <div class="form-group">
            <label>Confirm Password:</label>
            <input type="password" id="confirmPassword" value="debug123" required>
            <small>Current value: <span id="confirmPasswordValue">debug123</span></small>
        </div>
        
        <button type="submit">Test Registration</button>
    </form>
    
    <div id="debugInfo" class="debug">
        <h3>🔍 Debug Information:</h3>
        <p><strong>Password:</strong> <span id="debugPassword">-</span></p>
        <p><strong>Confirm Password:</strong> <span id="debugConfirmPassword">-</span></p>
        <p><strong>Match Status:</strong> <span id="debugMatch">-</span></p>
        <p><strong>Password Length:</strong> <span id="debugPasswordLength">-</span></p>
        <p><strong>Confirm Length:</strong> <span id="debugConfirmLength">-</span></p>
    </div>
    
    <div id="result"></div>

    <script src="api.js"></script>
    <script>
        // Real-time debug updates
        function updateDebugInfo() {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            document.getElementById('passwordValue').textContent = password;
            document.getElementById('confirmPasswordValue').textContent = confirmPassword;
            document.getElementById('debugPassword').textContent = `"${password}"`;
            document.getElementById('debugConfirmPassword').textContent = `"${confirmPassword}"`;
            document.getElementById('debugPasswordLength').textContent = password.length;
            document.getElementById('debugConfirmLength').textContent = confirmPassword.length;
            
            const match = password === confirmPassword;
            document.getElementById('debugMatch').textContent = match ? '✅ MATCH' : '❌ NO MATCH';
            document.getElementById('debugMatch').style.color = match ? 'green' : 'red';
        }
        
        // Add event listeners for real-time updates
        document.getElementById('password').addEventListener('input', updateDebugInfo);
        document.getElementById('confirmPassword').addEventListener('input', updateDebugInfo);
        
        // Initial update
        updateDebugInfo();
        
        // Form submission
        document.getElementById('debugRegisterForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const resultDiv = document.getElementById('result');
            
            // Debug logging
            console.log('Form submitted with:');
            console.log('Name:', name);
            console.log('Email:', email);
            console.log('Password:', `"${password}" (length: ${password.length})`);
            console.log('Confirm Password:', `"${confirmPassword}" (length: ${confirmPassword.length})`);
            console.log('Passwords match:', password === confirmPassword);
            
            // Validate passwords match
            if (password !== confirmPassword) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <h4>❌ Password Validation Failed</h4>
                        <p><strong>Password:</strong> "${password}" (${password.length} chars)</p>
                        <p><strong>Confirm:</strong> "${confirmPassword}" (${confirmPassword.length} chars)</p>
                        <p><strong>Match:</strong> ${password === confirmPassword}</p>
                        <p><strong>Issue:</strong> Passwords do not match exactly</p>
                    </div>
                `;
                return;
            }
            
            try {
                resultDiv.innerHTML = '<div class="debug">🔄 Attempting registration...</div>';
                
                const response = await api.register({ name, email, password });
                
                resultDiv.innerHTML = `
                    <div class="success">
                        <h4>✅ Registration Successful!</h4>
                        <p><strong>User:</strong> ${response.user.name}</p>
                        <p><strong>Email:</strong> ${response.user.email}</p>
                        <p><strong>ID:</strong> ${response.user.id}</p>
                        <p><strong>Role:</strong> ${response.user.role}</p>
                        <p><strong>Created:</strong> ${new Date(response.user.created_at).toLocaleString()}</p>
                    </div>
                `;
                
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <h4>❌ Registration Failed</h4>
                        <p><strong>Error:</strong> ${error.message}</p>
                    </div>
                `;
            }
        });
        
        // Test different scenarios
        function testScenario(pwd1, pwd2, description) {
            document.getElementById('password').value = pwd1;
            document.getElementById('confirmPassword').value = pwd2;
            updateDebugInfo();
            console.log(`Test: ${description} - Match: ${pwd1 === pwd2}`);
        }
        
        // Add test buttons
        setTimeout(() => {
            const container = document.querySelector('body');
            const testDiv = document.createElement('div');
            testDiv.innerHTML = `
                <h3>🧪 Test Scenarios:</h3>
                <button onclick="testScenario('test123', 'test123', 'Identical passwords')" style="width: auto; margin: 5px;">Test: Identical</button>
                <button onclick="testScenario('test123', 'test124', 'Different passwords')" style="width: auto; margin: 5px;">Test: Different</button>
                <button onclick="testScenario('test123', 'test123 ', 'Trailing space')" style="width: auto; margin: 5px;">Test: Trailing Space</button>
                <button onclick="testScenario(' test123', 'test123', 'Leading space')" style="width: auto; margin: 5px;">Test: Leading Space</button>
            `;
            container.appendChild(testDiv);
        }, 1000);
    </script>
</body>
</html>
